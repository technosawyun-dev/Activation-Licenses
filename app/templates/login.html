<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — Saw Yun LLC</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet"/>
  <script defer src="https://unpkg.com/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      font-family: 'Inter', sans-serif;
      background: #101415;
      color: #e0e3e5;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
    }
    .msym {
      font-family: 'Material Symbols Outlined';
      font-size: 20px;
      line-height: 1;
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      display: inline-block;
    }
    .msym-fill { font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
    .field-label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #8d90a0;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 6px;
    }
    .field-input {
      display: block;
      width: 100%;
      background: #272a2c;
      border: 1px solid #434655;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 14px;
      color: #e0e3e5;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      font-family: 'Inter', sans-serif;
    }
    .field-input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.18);
    }
    .field-input::placeholder { color: #8d90a0; }
    .btn-signin {
      display: block;
      width: 100%;
      background: #2563eb;
      color: #eeefff;
      font-size: 14px;
      font-weight: 700;
      padding: 11px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: filter 0.15s, transform 0.1s;
    }
    .btn-signin:hover { filter: brightness(1.15); }
    .btn-signin:active { transform: scale(0.98); }
  </style>
</head>
<body style="display:flex; align-items:center; justify-content:center; min-height:100vh; padding:16px;
     background: radial-gradient(ellipse at 60% 0%, rgba(37,99,235,0.12) 0%, transparent 60%), #101415;">

  <div style="width:100%; max-width:360px;">

    <!-- Brand -->
    <div style="text-align:center; margin-bottom:32px;">
      <div style="display:inline-flex; align-items:center; justify-content:center;
           width:56px; height:56px; border-radius:16px; background:#2563eb; margin-bottom:20px;
           box-shadow: 0 0 0 8px rgba(37,99,235,0.12), 0 8px 24px rgba(37,99,235,0.3);">
        <span class="msym msym-fill" style="font-size:28px; color:#eeefff;">deployed_code</span>
      </div>
      <h1 style="font-size:22px; font-weight:800; color:#e0e3e5; letter-spacing:-0.5px; margin:0 0 4px;">Saw Yun LLC</h1>
      <p style="font-size:11px; color:#8d90a0; font-family:'JetBrains Mono',monospace; text-transform:uppercase; letter-spacing:0.12em; margin:0;">Control Center</p>
    </div>

    <!-- Card -->
    <div style="background:#1d2022; border:1px solid rgba(255,255,255,0.08); border-radius:14px;
                padding:28px 24px; box-shadow:0 24px 60px rgba(0,0,0,0.5);">

      {% if error %}
      <div style="display:flex; align-items:center; gap:10px;
           background:rgba(147,0,10,0.15); border:1px solid rgba(255,180,171,0.25);
           border-radius:8px; padding:10px 14px; margin-bottom:20px;">
        <span class="msym" style="color:#ffb4ab; font-size:18px; flex-shrink:0;">error</span>
        <span style="font-size:13px; color:#ffb4ab; line-height:1.4;">{{ error }}</span>
      </div>
      {% endif %}

      <form method="POST" action="/admin/login">
        <!-- Username -->
        <div style="margin-bottom:16px;">
          <label class="field-label">Username</label>
          <input type="text" name="username" required autofocus
                 placeholder="Enter your username"
                 class="field-input"/>
        </div>

        <!-- Password -->
        <div style="margin-bottom:20px;" x-data="{ show: false }">
          <label class="field-label">Password</label>
          <div style="position:relative;">
            <input :type="show ? 'text' : 'password'"
                   name="password" required
                   placeholder="Enter your password"
                   class="field-input"
                   style="padding-right:44px;"/>
            <button type="button" @click="show = !show"
                    style="position:absolute; right:10px; top:50%; transform:translateY(-50%);
                           background:none; border:none; cursor:pointer; color:#8d90a0;
                           display:flex; align-items:center; padding:4px; line-height:1;">
              <span class="msym" style="font-size:18px;" x-text="show ? 'visibility_off' : 'visibility'">visibility</span>
            </button>
          </div>
        </div>

        <button type="submit" class="btn-signin">Sign In</button>
      </form>
    </div>

    <p style="text-align:center; font-size:11px; color:#434655; margin-top:20px;
              font-family:'JetBrains Mono',monospace; text-transform:uppercase; letter-spacing:0.1em;">
      Saw Yun LLC — Internal Admin Panel
    </p>
  </div>

</body>
</html>
